name: Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  smoke-build:
    name: Cargo Fuzz Smoke Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Smoke-build fuzz targets
        run: python scripts/run_rust_fuzz.py --smoke-build
